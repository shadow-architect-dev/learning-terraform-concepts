<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 850" width="100%" height="100%">
  <!-- Background -->
  <rect width="1000" height="850" fill="#f8fafc" rx="10" />
  
  <!-- Definitions -->
  <defs>
    <!-- Gradients -->
    <linearGradient id="publicGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
    <linearGradient id="privateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" />
      <stop offset="100%" stop-color="#dcfce7" />
    </linearGradient>
    <linearGradient id="isolatedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed" />
      <stop offset="100%" stop-color="#ffedd5" />
    </linearGradient>
    <linearGradient id="awsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#232f3e" />
      <stop offset="100%" stop-color="#3b4859" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.1" />
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#64748b" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#10b981" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="45" font-family="Segoe UI, sans-serif" font-size="22" font-weight="bold" fill="#0f172a">AWS 3-Tier Multi-AZ Architecture (FISC-Compliant)</text>
  <text x="40" y="70" font-family="Segoe UI, sans-serif" font-size="14" fill="#64748b">Secure EKS &amp; Database Topology with Egress Restrictions</text>

  <!-- Internet Gateway (outside VPC) -->
  <rect x="450" y="25" width="100" height="40" rx="5" fill="#232f3e" filter="url(#shadow)" />
  <text x="500" y="50" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Internet</text>

  <!-- VPC Boundary -->
  <rect x="40" y="90" width="920" height="730" rx="10" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="5 5" />
  <text x="60" y="115" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#475569">VPC (10.0.0.0/16)</text>

  <!-- AZ Columns (Clean Separations) -->
  <!-- AZ-A Column -->
  <line x1="330" y1="130" x2="330" y2="800" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4" />
  <text x="60" y="145" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">AZ-A (ap-northeast-1a)</text>

  <!-- AZ-B Column -->
  <line x1="650" y1="130" x2="650" y2="800" stroke="#e2e8f0" stroke-width="1.5" stroke-dasharray="4 4" />
  <text x="350" y="145" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">AZ-B (ap-northeast-1c)</text>

  <!-- AZ-C Column -->
  <text x="670" y="145" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#94a3b8">AZ-C (ap-northeast-1d)</text>

  <!-- 1. Public Subnets Layer -->
  <rect x="50" y="165" width="900" height="150" rx="8" fill="url(#publicGrad)" stroke="#93c5fd" stroke-width="1.5" />
  <text x="65" y="190" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1d4ed8">Public Subnets</text>

  <!-- Public Components -->
  <!-- WAFv2 -->
  <rect x="440" y="180" width="120" height="40" rx="6" fill="#dd344c" filter="url(#shadow)" />
  <text x="500" y="205" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">AWS WAFv2</text>

  <!-- ALB -->
  <rect x="440" y="250" width="120" height="40" rx="6" fill="#8c4fff" filter="url(#shadow)" />
  <text x="500" y="275" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Application Load Balancer</text>

  <!-- Single NAT Gateway 1 (AZ-A only, dev environment) -->
  <rect x="120" y="220" width="120" height="45" rx="6" fill="#0284c7" filter="url(#shadow)" />
  <text x="180" y="240" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">NAT Gateway 1</text>
  <text x="180" y="255" font-family="Segoe UI, sans-serif" font-size="9" fill="#e0f2fe" text-anchor="middle">(Outbound Only)</text>


  <!-- 2. Private Subnets Layer -->
  <rect x="50" y="340" width="900" height="200" rx="8" fill="url(#privateGrad)" stroke="#86efac" stroke-width="1.5" />
  <text x="65" y="365" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#15803d">Private Subnets (EKS Layer)</text>

  <!-- EKS Cluster logical group -->
  <rect x="80" y="380" width="600" height="140" rx="6" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3 3" />
  <text x="95" y="405" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#16a34a">EKS Node Group</text>

  <!-- EKS Nodes (1 Node per AZ, spaced out) -->
  <rect x="120" y="420" width="120" height="40" rx="6" fill="#3b82f6" filter="url(#shadow)" />
  <text x="180" y="445" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">EKS Node (AZ-A)</text>

  <rect x="360" y="420" width="120" height="40" rx="6" fill="#3b82f6" filter="url(#shadow)" />
  <text x="420" y="445" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">EKS Node (AZ-B)</text>

  <rect x="530" y="420" width="120" height="40" rx="6" fill="#3b82f6" filter="url(#shadow)" />
  <text x="590" y="445" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">EKS Node (AZ-C)</text>

  <!-- VPC Endpoints (PrivateLink) -->
  <rect x="710" y="380" width="210" height="140" rx="6" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="725" y="405" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#475569">VPC Endpoints (PrivateLink)</text>
  <text x="735" y="435" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">■ ECR (api/dkr) - Interface</text>
  <text x="735" y="455" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">■ STS / Logs - Interface</text>
  <text x="735" y="475" font-family="Segoe UI, sans-serif" font-size="11" fill="#64748b">■ S3 - Gateway</text>
  <text x="735" y="495" font-family="Segoe UI, sans-serif" font-size="10" font-weight="bold" fill="#15803d">✓ Zero Internet Routing</text>


  <!-- 3. Isolated Subnets Layer -->
  <rect x="50" y="565" width="900" height="230" rx="8" fill="url(#isolatedGrad)" stroke="#fdbb2d" stroke-width="1.5" />
  <text x="65" y="590" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#c2410c">Isolated Subnets (Database Layer)</text>
  <text x="65" y="610" font-family="Segoe UI, sans-serif" font-size="10" fill="#ea580c">⚠️ FISC Compliant: Strict No-Egress (Outbound Completely Blocked)</text>

  <!-- Aurora PostgreSQL Serverless v2 Instances (No horizontal connection arrows) -->
  <!-- AZ-A Aurora -->
  <rect x="120" y="630" width="140" height="50" rx="6" fill="#ea580c" filter="url(#shadow)" />
  <text x="190" y="650" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Aurora PostgreSQL</text>
  <text x="190" y="665" font-family="Segoe UI, sans-serif" font-size="9" fill="#ffedd5" text-anchor="middle">Instance 1 (AZ-A)</text>

  <!-- AZ-B Aurora -->
  <rect x="360" y="630" width="140" height="50" rx="6" fill="#ea580c" filter="url(#shadow)" />
  <text x="430" y="650" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Aurora PostgreSQL</text>
  <text x="430" y="665" font-family="Segoe UI, sans-serif" font-size="9" fill="#ffedd5" text-anchor="middle">Instance 2 (AZ-B)</text>

  <!-- AZ-C Aurora -->
  <rect x="530" y="630" width="140" height="50" rx="6" fill="#ea580c" filter="url(#shadow)" />
  <text x="600" y="650" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">Aurora PostgreSQL</text>
  <text x="600" y="665" font-family="Segoe UI, sans-serif" font-size="9" fill="#ffedd5" text-anchor="middle">Instance 3 (AZ-C)</text>

  <!-- ElastiCache Redis replication nodes (One single Redis instance per AZ, no duplicates, no horizontal arrows) -->
  <!-- AZ-A Redis -->
  <rect x="120" y="715" width="140" height="50" rx="6" fill="#dc2626" filter="url(#shadow)" />
  <text x="190" y="738" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">ElastiCache Redis</text>
  <text x="190" y="753" font-family="Segoe UI, sans-serif" font-size="9" fill="#fee2e2" text-anchor="middle">Node 1 (AZ-A)</text>

  <!-- AZ-B Redis -->
  <rect x="360" y="715" width="140" height="50" rx="6" fill="#dc2626" filter="url(#shadow)" />
  <text x="430" y="738" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">ElastiCache Redis</text>
  <text x="430" y="753" font-family="Segoe UI, sans-serif" font-size="9" fill="#fee2e2" text-anchor="middle">Node 2 (AZ-B)</text>

  <!-- AZ-C Redis -->
  <rect x="530" y="715" width="140" height="50" rx="6" fill="#dc2626" filter="url(#shadow)" />
  <text x="600" y="738" font-family="Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">ElastiCache Redis</text>
  <text x="600" y="753" font-family="Segoe UI, sans-serif" font-size="9" fill="#fee2e2" text-anchor="middle">Node 3 (AZ-C)</text>


  <!-- Connections -->

  <!-- Inbound Traffic: Internet -> WAFv2 -> ALB -->
  <path d="M 500 65 L 500 180" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <path d="M 500 220 L 500 250" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

  <!-- ALB -> EKS Nodes Parallel Routing -->
  <path d="M 500 290 L 500 320 L 180 320 L 180 420" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 500 290 L 500 420" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />
  <path d="M 500 290 L 500 320 L 590 320 L 590 420" fill="none" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)" />

  <!-- Outbound Route: EKS Node (AZ-A) -> NAT Gateway 1 -> Internet -->
  <path d="M 180 420 L 180 265" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow)" />
  <path d="M 180 220 L 180 130 L 450 130 L 450 65" fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="4 2" marker-end="url(#arrow)" />

  <!-- Parallel EKS -> DB / Cache Connections (One-way arrows from EKS to each resource) -->
  <!-- AZ-A connections -->
  <path d="M 180 460 L 180 630" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 180 460 L 180 540 L 105 540 L 105 740 L 120 740" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- AZ-B connections -->
  <path d="M 420 460 L 420 630" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 420 460 L 420 545 L 345 545 L 345 740 L 360 740" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- AZ-C connections -->
  <path d="M 590 460 L 590 630" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />
  <path d="M 590 460 L 590 550 L 515 550 L 515 740 L 530 740" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#arrow-green)" />

  <!-- Private EKS Nodes -> VPC Endpoints -->
  <path d="M 680 450 L 710 450" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />

</svg>
