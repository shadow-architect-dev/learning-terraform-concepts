name: IaC Continuous Deployment

on:
  push:
    branches:
      - main
      - develop
      - 'release/*'

permissions:
  id-token: write
  contents: read

jobs:
  validate-and-deploy:
    name: Validate & Deploy (Verification Only)
    runs-on: ubuntu-latest
    steps:
      # 1. コードのチェックアウト
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Terraform CLI のインストール
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0

      # 3. ブランチに基づく環境名の決定
      - name: Set Environment Variables
        id: env_setup
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
            echo "AWS_ROLE_ARN=${{ secrets.ROLE_ARN_PROD }}" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" =~ ^release/ ]]; then
            echo "ENV_NAME=stg" >> $GITHUB_ENV
            echo "AWS_ROLE_ARN=${{ secrets.ROLE_ARN_STG }}" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
            echo "AWS_ROLE_ARN=${{ secrets.ROLE_ARN_DEV }}" >> $GITHUB_ENV
          fi
        shell: bash

      # 4. ローカル検証（AWS接続なしでの初期化 ＆ 構文チェック）
      - name: Terraform Init & Validate (Local Verification)
        run: |
          terraform init -backend=false
          terraform validate

