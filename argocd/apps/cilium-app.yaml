apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-cni
  namespace: argocd
spec:
  project: default
  source:
    chart: cilium
    repoURL: 'https://helm.cilium.io/'
    targetRevision: 1.15.2
    helm:
      values: |
        cni:
          chainingMode: "aws-vpc-cni"
          exclusive: false
        enableIPv4Masquerade: false
        tunnel: "disabled"
        ipam:
          mode: "aws-vpc-cni"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
